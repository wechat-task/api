basePath: /api/v1
definitions:
  handler.CreateSkillRequest:
    properties:
      category:
        type: string
      content:
        type: string
      description:
        type: string
      name:
        type: string
      parameters:
        $ref: '#/definitions/model.SkillParameters'
      status:
        allOf:
        - $ref: '#/definitions/model.SkillStatus'
        example: draft
      tags:
        items:
          type: string
        type: array
      visibility:
        allOf:
        - $ref: '#/definitions/model.SkillVisibility'
        example: private
    required:
    - content
    - name
    type: object
  handler.RegisterOptionsRequest:
    properties:
      username:
        example: john_doe
        type: string
    required:
    - username
    type: object
  handler.SubscribeToSkillRequest:
    properties:
      config:
        $ref: '#/definitions/model.SkillExecutionConfig'
    required:
    - config
    type: object
  handler.UpdateProfileRequest:
    properties:
      icon:
        example: https://example.com/avatar.png
        type: string
      username:
        example: john_doe
        type: string
    type: object
  handler.UpdateSkillRequest:
    properties:
      category:
        type: string
      content:
        type: string
      description:
        type: string
      name:
        type: string
      parameters:
        $ref: '#/definitions/model.SkillParameters'
      status:
        $ref: '#/definitions/model.SkillStatus'
      tags:
        items:
          type: string
        type: array
      visibility:
        $ref: '#/definitions/model.SkillVisibility'
    type: object
  handler.UpdateSubscriptionRequest:
    properties:
      bot_id:
        type: integer
      channel_id:
        type: integer
      config:
        $ref: '#/definitions/model.SkillExecutionConfig'
      next_run_at:
        type: string
      schedule_cron:
        type: string
      status:
        type: string
      time_zone:
        type: string
    type: object
  handler.createBotRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handler.createLarkChannelRequest:
    properties:
      secret:
        example: optional
        type: string
      webhook_url:
        example: https://open.feishu.cn/open-apis/bot/v2/hook/xxx
        type: string
    required:
    - webhook_url
    type: object
  handler.sendMessageRequest:
    properties:
      text:
        example: Hello!
        type: string
    required:
    - text
    type: object
  handler.updateBotRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  model.Bot:
    properties:
      channels:
        items:
          $ref: '#/definitions/model.Channel'
        type: array
      created_at:
        example: "2026-03-30T10:00:00Z"
        type: string
      description:
        example: Work assistant bot
        type: string
      id:
        example: 1
        type: integer
      name:
        example: My Bot
        type: string
      status:
        description: pending, active, disconnected, expired
        example: pending
        type: string
      updated_at:
        example: "2026-03-30T10:00:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  model.Channel:
    properties:
      bot_id:
        example: 1
        type: integer
      config:
        $ref: '#/definitions/model.ChannelConfig'
      created_at:
        example: "2026-03-30T10:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      last_cursor:
        type: string
      status:
        description: pending, active, disconnected, expired
        example: pending
        type: string
      type:
        allOf:
        - $ref: '#/definitions/model.ChannelType'
        example: wechat_clawbot
      updated_at:
        example: "2026-03-30T10:00:00Z"
        type: string
    type: object
  model.ChannelConfig:
    additionalProperties: true
    type: object
  model.ChannelType:
    enum:
    - wechat_clawbot
    - lark
    type: string
    x-enum-varnames:
    - ChannelTypeWechatClawbot
    - ChannelTypeLark
  model.LLMConfig:
    properties:
      api_key:
        description: Encrypted API key
        type: string
      base_url:
        description: Custom base URL for self-hosted
        type: string
      max_tokens:
        type: integer
      model:
        description: Model name (e.g., gpt-4, claude-3)
        type: string
      provider:
        description: openai, anthropic, azure, local
        type: string
      temperature:
        type: number
    type: object
  model.Skill:
    properties:
      category:
        type: string
      content:
        description: Markdown content following Anthropic skill format
        type: string
      created_at:
        type: string
      description:
        type: string
      execution_count:
        type: integer
      id:
        type: integer
      name:
        type: string
      parameters:
        allOf:
        - $ref: '#/definitions/model.SkillParameters'
        description: Parameter definitions
      status:
        $ref: '#/definitions/model.SkillStatus'
      subscriber_count:
        description: Statistics
        type: integer
      tags:
        items:
          type: string
        type: array
      updated_at:
        type: string
      user_id:
        type: integer
      version:
        type: string
      visibility:
        allOf:
        - $ref: '#/definitions/model.SkillVisibility'
        description: Metadata
    type: object
  model.SkillExecutionConfig:
    properties:
      llm_config:
        allOf:
        - $ref: '#/definitions/model.LLMConfig'
        description: User-specified LLM configuration
      parameters:
        additionalProperties: {}
        description: Parameter values for this subscription
        type: object
    type: object
  model.SkillParameter:
    properties:
      default:
        description: Default value
      description:
        description: Parameter description
        type: string
      enum_values:
        description: Valid enum values
        items:
          type: string
        type: array
      required:
        description: Whether parameter is required
        type: boolean
      type:
        description: string, number, boolean, enum
        type: string
    type: object
  model.SkillParameters:
    additionalProperties:
      $ref: '#/definitions/model.SkillParameter'
    type: object
  model.SkillStatus:
    enum:
    - draft
    - published
    - archived
    type: string
    x-enum-comments:
      SkillStatusArchived: Archived, not executable
      SkillStatusDraft: Draft, not executable
      SkillStatusPublished: Published and executable
    x-enum-descriptions:
    - Draft, not executable
    - Published and executable
    - Archived, not executable
    x-enum-varnames:
    - SkillStatusDraft
    - SkillStatusPublished
    - SkillStatusArchived
  model.SkillSubscription:
    properties:
      bot:
        $ref: '#/definitions/model.Bot'
      bot_id:
        description: Delivery channel configuration
        type: integer
      channel:
        $ref: '#/definitions/model.Channel'
      channel_id:
        type: integer
      config:
        allOf:
        - $ref: '#/definitions/model.SkillExecutionConfig'
        description: Execution configuration
      created_at:
        type: string
      id:
        type: integer
      next_run_at:
        description: Next execution time (for scheduler)
        type: string
      schedule_cron:
        description: Schedule overrides (overrides skill's default schedule)
        type: string
      skill:
        allOf:
        - $ref: '#/definitions/model.Skill'
        description: Associations
      skill_id:
        type: integer
      status:
        type: string
      time_zone:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  model.SkillVisibility:
    enum:
    - private
    - public
    - unlisted
    type: string
    x-enum-comments:
      SkillVisibilityPrivate: Only visible to creator
      SkillVisibilityPublic: Visible to all users
      SkillVisibilityUnlisted: Accessible via link
    x-enum-descriptions:
    - Only visible to creator
    - Visible to all users
    - Accessible via link
    x-enum-varnames:
    - SkillVisibilityPrivate
    - SkillVisibilityPublic
    - SkillVisibilityUnlisted
  model.User:
    properties:
      created_at:
        example: "2026-03-26T10:30:00Z"
        type: string
      icon:
        example: https://example.com/avatar.png
        type: string
      id:
        example: 1
        type: integer
      updated_at:
        example: "2026-03-26T10:30:00Z"
        type: string
      username:
        example: john_doe
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: User management API with Passkeys (WebAuthn) authentication
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: WeChat Task API
  version: "1.0"
paths:
  /:
    get:
      description: Returns project details and available API documentation link
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get project info
      tags:
      - system
  /auth/passkey/login/options:
    post:
      description: Generate WebAuthn login options
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Begin passkey login
      tags:
      - auth
  /auth/passkey/login/verify:
    post:
      consumes:
      - application/json
      description: Complete WebAuthn login by verifying the assertion response
      parameters:
      - description: session_id and WebAuthn assertion response
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify passkey login
      tags:
      - auth
  /auth/passkey/register/options:
    post:
      consumes:
      - application/json
      description: Generate WebAuthn registration options. User must provide a username.
      parameters:
      - description: Username (required)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterOptionsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Begin passkey registration
      tags:
      - auth
  /auth/passkey/register/verify:
    post:
      consumes:
      - application/json
      description: Complete WebAuthn registration by verifying the credential response
      parameters:
      - description: session_id and WebAuthn credential response
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify passkey registration
      tags:
      - auth
  /bots:
    get:
      consumes:
      - application/json
      description: List all bots belonging to the authenticated user, including their
        channels
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Bot'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List bots
      tags:
      - bot
    post:
      consumes:
      - application/json
      description: Create a new bot with a name. Channels can be added separately.
      parameters:
      - description: Bot creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createBotRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Bot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create bot
      tags:
      - bot
  /bots/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a bot by ID (cascades to channels)
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete bot
      tags:
      - bot
    get:
      consumes:
      - application/json
      description: Get a bot by ID with its channels
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Bot'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get bot
      tags:
      - bot
    put:
      consumes:
      - application/json
      description: Update a bot's name and description (both optional)
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      - description: Bot updates
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateBotRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Bot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update bot
      tags:
      - bot
  /bots/{id}/channels:
    get:
      consumes:
      - application/json
      description: List all channels for a bot
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Channel'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List channels
      tags:
      - channel
  /bots/{id}/channels/{channelId}:
    delete:
      consumes:
      - application/json
      description: Delete a channel by ID
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      - description: Channel ID
        in: path
        name: channelId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete channel
      tags:
      - channel
  /bots/{id}/channels/{channelId}/send:
    post:
      consumes:
      - application/json
      description: Send a text message to a specific channel
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      - description: Channel ID
        in: path
        name: channelId
        required: true
        type: integer
      - description: Message content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.sendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Send message to channel
      tags:
      - channel
  /bots/{id}/channels/lark:
    post:
      consumes:
      - application/json
      description: Create a Lark webhook channel for a bot. Requires a webhook_url
        and optional secret.
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      - description: Channel config
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createLarkChannelRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create Lark webhook channel
      tags:
      - channel
  /bots/{id}/channels/wechat-clawbot:
    post:
      consumes:
      - application/json
      description: Create a WeChat clawbot channel for a bot. Returns a QR code for
        the user to scan.
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create WeChat clawbot channel
      tags:
      - channel
  /health:
    get:
      description: Returns the health status of the service and database connectivity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - system
  /skills:
    post:
      consumes:
      - application/json
      description: Create a new AI skill
      parameters:
      - description: Skill information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateSkillRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created skill
          schema:
            $ref: '#/definitions/model.Skill'
        "400":
          description: 请求无效
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create skill
      tags:
      - skills
  /skills/{id}:
    delete:
      consumes:
      - application/json
      description: Delete skill
      parameters:
      - description: Skill ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: 删除成功
        "400":
          description: 请求无效
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 无权限
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 技能不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete skill
      tags:
      - skills
    get:
      consumes:
      - application/json
      description: Get skill details by ID
      parameters:
      - description: Skill ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Skill details
          schema:
            $ref: '#/definitions/model.Skill'
        "400":
          description: 请求无效
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 技能不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get skill details
      tags:
      - skills
    put:
      consumes:
      - application/json
      description: Update skill information
      parameters:
      - description: Skill ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateSkillRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated skill
          schema:
            $ref: '#/definitions/model.Skill'
        "400":
          description: 请求无效
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 技能不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update skill
      tags:
      - skills
  /skills/{id}/subscribe:
    post:
      consumes:
      - application/json
      description: Subscribe to a published skill
      parameters:
      - description: Skill ID
        in: path
        name: id
        required: true
        type: integer
      - description: Subscription configuration
        in: body
        name: request
        required: true
        schema:
