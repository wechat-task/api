basePath: /api/v1
definitions:
  handler.RegisterOptionsRequest:
    properties:
      username:
        example: john_doe
        type: string
    required:
    - username
    type: object
  handler.UpdateProfileRequest:
    properties:
      icon:
        example: https://example.com/avatar.png
        type: string
      username:
        example: john_doe
        type: string
    type: object
  handler.createBotRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handler.updateBotRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  model.Bot:
    properties:
      channels:
        items:
          $ref: '#/definitions/model.Channel'
        type: array
      created_at:
        example: "2026-03-30T10:00:00Z"
        type: string
      description:
        example: Work assistant bot
        type: string
      id:
        example: 1
        type: integer
      name:
        example: My Bot
        type: string
      status:
        description: pending, active, disconnected, expired
        example: pending
        type: string
      updated_at:
        example: "2026-03-30T10:00:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  model.Channel:
    properties:
      bot_id:
        example: 1
        type: integer
      config:
        $ref: '#/definitions/model.ChannelConfig'
      created_at:
        example: "2026-03-30T10:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      last_cursor:
        type: string
      status:
        description: pending, active, disconnected, expired
        example: pending
        type: string
      type:
        allOf:
        - $ref: '#/definitions/model.ChannelType'
        example: wechat_clawbot
      updated_at:
        example: "2026-03-30T10:00:00Z"
        type: string
    type: object
  model.ChannelConfig:
    additionalProperties: true
    type: object
  model.ChannelType:
    enum:
    - wechat_clawbot
    - lark
    type: string
    x-enum-varnames:
    - ChannelTypeWechatClawbot
    - ChannelTypeLark
  model.User:
    properties:
      created_at:
        example: "2026-03-26T10:30:00Z"
        type: string
      icon:
        example: https://example.com/avatar.png
        type: string
      id:
        example: 1
        type: integer
      updated_at:
        example: "2026-03-26T10:30:00Z"
        type: string
      username:
        example: john_doe
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: User management API with Passkeys (WebAuthn) authentication
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: WeChat Task API
  version: "1.0"
paths:
  /:
    get:
      description: Returns project details and available API documentation link
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get project info
      tags:
      - system
  /auth/passkey/login/options:
    post:
      description: Generate WebAuthn login options
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Begin passkey login
      tags:
      - auth
  /auth/passkey/login/verify:
    post:
      consumes:
      - application/json
      description: Complete WebAuthn login by verifying the assertion response
      parameters:
      - description: session_id and WebAuthn assertion response
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify passkey login
      tags:
      - auth
  /auth/passkey/register/options:
    post:
      consumes:
      - application/json
      description: Generate WebAuthn registration options. User must provide a username.
      parameters:
      - description: Username (required)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterOptionsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Begin passkey registration
      tags:
      - auth
  /auth/passkey/register/verify:
    post:
      consumes:
      - application/json
      description: Complete WebAuthn registration by verifying the credential response
      parameters:
      - description: session_id and WebAuthn credential response
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify passkey registration
      tags:
      - auth
  /bots:
    get:
      consumes:
      - application/json
      description: List all bots belonging to the authenticated user, including their
        channels
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Bot'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List bots
      tags:
      - bot
    post:
      consumes:
      - application/json
      description: Create a new bot with a name. Channels can be added separately.
      parameters:
      - description: Bot creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createBotRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Bot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create bot
      tags:
      - bot
  /bots/{botId}/channels:
    get:
      consumes:
      - application/json
      description: List all channels for a bot
      parameters:
      - description: Bot ID
        in: path
        name: botId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Channel'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List channels
      tags:
      - channel
  /bots/{botId}/channels/{channelId}:
    delete:
      consumes:
      - application/json
      description: Delete a channel by ID
      parameters:
      - description: Bot ID
        in: path
        name: botId
        required: true
        type: integer
      - description: Channel ID
        in: path
        name: channelId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete channel
      tags:
      - channel
  /bots/{botId}/channels/wechat-clawbot:
    post:
      consumes:
      - application/json
      description: Create a WeChat clawbot channel for a bot. Returns a QR code for
        the user to scan.
      parameters:
      - description: Bot ID
        in: path
        name: botId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create WeChat clawbot channel
      tags:
      - channel
  /bots/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a bot by ID (cascades to channels)
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete bot
      tags:
      - bot
    get:
      consumes:
      - application/json
      description: Get a bot by ID with its channels
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Bot'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get bot
      tags:
      - bot
    put:
      consumes:
      - application/json
      description: Update a bot's name and description (both optional)
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: integer
      - description: Bot updates
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateBotRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Bot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update bot
      tags:
      - bot
  /health:
    get:
      description: Returns the health status of the service and database connectivity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - system
  /user/me:
    get:
      consumes:
      - application/json
      description: Get authenticated user's profile information
      produces:
      - application/json
      responses:
        "200":
          description: User profile
          schema:
            $ref: '#/definitions/model.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - user
  /user/profile:
    put:
      consumes:
      - application/json
      description: Update authenticated user's profile (username and/or icon)
      parameters:
      - description: Profile fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated user profile
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - user
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
