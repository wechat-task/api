server:
  port: 8080
  mode: debug # debug, release, test

database:
  url: postgres://postgres:postgres@localhost:5432/wechat_task?sslmode=disable
  # Environment variable override: ${DATABASE_URL}

webauthn:
  rp_display_name: WeChat Task
  rp_id: localhost
  rp_origins:
    - http://localhost:8080
  timeout: 5m
  # Environment variable overrides
  # rp_display_name: ${WEBAUTHN_RP_DISPLAY_NAME}
  # rp_id: ${WEBAUTHN_RP_ID}
  # rp_origins:
  #   - ${WEBAUTHN_RP_ORIGIN}

jwt:
  secret: change-this-secret-in-production
  # Environment variable override: ${JWT_SECRET}
  # IMPORTANT: Use a strong, random secret in production!

# Logging configuration is automatically set based on server.mode
# debug: colored text format, Debug level
# release: JSON format, Info level
# test: text format, Warn level
